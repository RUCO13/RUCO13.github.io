<style>
  /* === Posts layout (lista + detalle) === */
  .posts-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 0;
  }

  .posts-header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .posts-title {
    font-size: 2.5rem;
    font-weight: 700;
    color: #04f4e8;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border-bottom: 3px solid #04f4e8;
    padding-bottom: 0.5rem;
    margin-bottom: 0.8rem;
  }

  .posts-subtitle {
    color: #94a3b8;
    max-width: 850px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .posts-grid {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 2rem;
    align-items: start;
  }

  /* === Lista === */
  .posts-list {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 1rem;
    backdrop-filter: blur(10px);
  }

  .posts-search {
    display: flex;
    gap: 0.7rem;
    margin-bottom: 1rem;
  }

  .posts-search input {
    flex: 1;
    padding: 0.8rem 0.9rem;
    border-radius: 10px;
    border: 1px solid rgba(4, 244, 232, 0.25);
    background: rgba(0,0,0,0.15);
    color: #e2e8f0;
    outline: none;
  }

  .posts-search input::placeholder { color: #94a3b8; }

  .post-item {
    padding: 1rem;
    border-radius: 12px;
    border: 1px solid rgba(110, 110, 128, 0.25);
    background: rgba(255,255,255,0.03);
    margin-bottom: 0.9rem;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .post-item:hover {
    transform: translateY(-2px);
    border-color: rgba(4, 244, 232, 0.5);
    box-shadow: 0 10px 25px rgba(4, 244, 232, 0.12);
  }

  .post-item.active {
    border-left: 4px solid #06f2ca;
    border-color: rgba(4, 244, 232, 0.7);
  }

  .post-item-title {
    color: #06f2ca;
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 0.35rem;
  }

  .post-item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    color: #94a3b8;
    font-size: 0.9rem;
    margin-bottom: 0.6rem;
  }

  .post-item-summary {
    color: #e2e8f0;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .tag-row {
    margin-top: 0.7rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .tag {
    padding: 0.25rem 0.7rem;
    border-radius: 999px;
    border: 1px solid rgba(4, 244, 232, 0.25);
    background: rgba(4, 244, 232, 0.10);
    color: #82e6d9;
    font-size: 0.8rem;
  }

  /* === Visor del post === */
  .post-viewer {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    padding: 1.4rem;
    backdrop-filter: blur(10px);
    min-height: 420px;
  }

  .viewer-topbar {
    display: flex;
    gap: 0.8rem;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid rgba(4, 244, 232, 0.15);
  }

  .viewer-status {
    color: #94a3b8;
    font-size: 0.95rem;
  }

  .viewer-btn {
    border: 2px solid #04f4e8;
    color: #04f4e8;
    background: rgba(4, 244, 232, 0.10);
    padding: 0.55rem 0.9rem;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.25s ease;
    display: inline-flex;
    gap: 0.5rem;
    align-items: center;
    text-decoration: none;
  }

  .viewer-btn:hover {
    background: rgba(4, 244, 232, 0.18);
    transform: translateY(-1px);
  }

  .post-article .post-title {
    color: #04f4e8;
    font-size: 2rem;
    margin-bottom: 0.6rem;
    line-height: 1.2;
  }

  .post-article .post-meta {
    color: #94a3b8;
    display: flex;
    gap: 1.2rem;
    flex-wrap: wrap;
    margin-bottom: 1.3rem;
  }

  .post-article .post-body {
    color: #e2e8f0;
    line-height: 1.8;
    font-size: 1.05rem;
  }

  .post-article h2 {
    color: #06f2ca;
    margin-top: 1.6rem;
    margin-bottom: 0.6rem;
  }

  .empty-state {
    padding: 2rem;
    text-align: center;
    color: #94a3b8;
  }

  @media (max-width: 900px) {
    .posts-grid { grid-template-columns: 1fr; }
    .post-viewer { min-height: 300px; }
  }
</style>

<div class="posts-wrap">
  <div class="posts-header">
    <h2 class="posts-title"><i class="fas fa-pen-nib"></i> Posts</h2>
    <p class="posts-subtitle">
      Resúmenes cortos, notas técnicas y cosas útiles. Selecciona un post y se abrirá aquí mismo.
    </p>
  </div>

  <div class="posts-grid">
    <!-- LISTA -->
    <aside class="posts-list">
      <div class="posts-search">
        <input id="postsSearch" type="text" placeholder="Buscar por título, tag o resumen..." />
      </div>
      <div id="postsList"></div>
    </aside>

    <!-- VISOR -->
    <section class="post-viewer">
      <div class="viewer-topbar">
        <div class="viewer-status" id="viewerStatus">
          Selecciona un post de la lista 👈
        </div>
        <button class="viewer-btn" id="backToListBtn" style="display:none;">
          <i class="fas fa-arrow-left"></i> Volver
        </button>
      </div>

      <div id="postViewerBody">
        <div class="empty-state">
          <i class="fas fa-book-open" style="font-size:2rem; color:#06f2ca;"></i>
          <p style="margin-top:1rem;">Aquí se cargará el contenido del post.</p>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
  (function () {
    const POSTS_JSON = './data/posts.json';

    const listEl = document.getElementById('postsList');
    const viewerBody = document.getElementById('postViewerBody');
    const viewerStatus = document.getElementById('viewerStatus');
    const searchEl = document.getElementById('postsSearch');
    const backBtn = document.getElementById('backToListBtn');

    let posts = [];
    let activeId = null;

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, (c) => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function fmtDate(dateStr) {
      // dateStr: YYYY-MM-DD
      if (!dateStr) return '';
      return dateStr;
    }

    function renderList(filter = '') {
      const q = filter.trim().toLowerCase();
      const filtered = !q ? posts : posts.filter(p => {
        const hay = [
          p.title, p.summary, (p.tags || []).join(' '), p.date
        ].join(' ').toLowerCase();
        return hay.includes(q);
      });

      if (!filtered.length) {
        listEl.innerHTML = `<div class="empty-state">No hay resultados.</div>`;
        return;
      }

      listEl.innerHTML = filtered.map(p => {
        const isActive = p.id === activeId ? 'active' : '';
        const tags = (p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
        return `
          <div class="post-item ${isActive}" data-id="${escapeHtml(p.id)}" data-file="${escapeHtml(p.file)}">
            <div class="post-item-title">${escapeHtml(p.title)}</div>
            <div class="post-item-meta">
              <span><i class="fas fa-calendar"></i> ${escapeHtml(fmtDate(p.date))}</span>
              <span><i class="fas fa-file-lines"></i> Post</span>
            </div>
            <div class="post-item-summary">${escapeHtml(p.summary || '')}</div>
            <div class="tag-row">${tags}</div>
          </div>
        `;
      }).join('');
    }

    async function loadPostById(id, pushHash=true) {
      const p = posts.find(x => x.id === id);
      if (!p) return;

      activeId = id;
      renderList(searchEl.value);

      viewerStatus.textContent = `Cargando: ${p.title}`;
      backBtn.style.display = 'inline-flex';

      try {
        const res = await fetch(p.file, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const html = await res.text();
        viewerBody.innerHTML = html;
        viewerStatus.textContent = p.title;

        // MathJax re-typeset (si existe en tu index)
        if (window.MathJax && window.MathJax.typesetPromise) {
          window.MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
        }

        // Dejar la URL con #posts?post=id (sin romper tu router)
        if (pushHash) {
          history.replaceState(null, '', `#posts?post=${encodeURIComponent(p.id)}`);
        }
      } catch (e) {
        viewerStatus.textContent = 'Error al cargar el post';
        viewerBody.innerHTML = `
          <div class="empty-state">
            <p>No pude cargar <strong>${escapeHtml(p.file)}</strong>.</p>
            <p style="margin-top:0.6rem;">Revisa que el archivo exista y la ruta sea correcta.</p>
          </div>
        `;
      }
    }

    function clearViewer(pushHash=true) {
      activeId = null;
      renderList(searchEl.value);
      backBtn.style.display = 'none';
      viewerStatus.textContent = 'Selecciona un post de la lista 👈';
      viewerBody.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-book-open" style="font-size:2rem; color:#06f2ca;"></i>
          <p style="margin-top:1rem;">Aquí se cargará el contenido del post.</p>
        </div>
      `;
      if (pushHash) history.replaceState(null, '', '#posts');
    }

    function getPostFromHash() {
      // Espera #posts?post=ID
      const h = (window.location.hash || '');
      if (!h.startsWith('#posts')) return null;
      const idx = h.indexOf('?');
      if (idx === -1) return null;
      const qs = new URLSearchParams(h.slice(idx + 1));
      return qs.get('post');
    }

    async function init() {
      try {
        const res = await fetch(POSTS_JSON, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        posts = await res.json();

        // Orden: más nuevo arriba (YYYY-MM-DD funciona lexicográficamente)
        posts.sort((a,b) => (b.date || '').localeCompare(a.date || ''));

        renderList('');

        // Click en items
        listEl.addEventListener('click', (e) => {
          const item = e.target.closest('.post-item');
          if (!item) return;
          loadPostById(item.dataset.id);
        });

        // Buscar
        searchEl.addEventListener('input', () => renderList(searchEl.value));

        // Volver
        backBtn.addEventListener('click', () => clearViewer());

        // Si abres directo con hash
        const fromHash = getPostFromHash();
        if (fromHash) loadPostById(fromHash, false);

        // Si cambia el hash (back/forward)
        window.addEventListener('hashchange', () => {
          const p = getPostFromHash();
          if (p) loadPostById(p, false);
          else if ((window.location.hash || '') === '#posts') clearViewer(false);
        });

      } catch (e) {
        listEl.innerHTML = `
          <div class="empty-state">
            <p>No pude leer <strong>${POSTS_JSON}</strong>.</p>
            <p style="margin-top:0.6rem;">Crea el archivo y verifica la ruta.</p>
          </div>
        `;
      }
    }

    init();
  })();
</script>
